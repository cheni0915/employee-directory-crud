<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>員工通訊錄</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>員工通訊錄</h1>
        <p class="subtitle">前端用 JavaScript 呼叫 .NET Minimal API</p>


        <!--新增-->
        <section class="card">
            <h2 id="form-title">新增員工</h2>

            <form id="employee-form">
                <input type="hidden" id="employee-id" />

                <div class="form-row">
                    <label for="name">姓名</label>
                    <input type="text" id="name" required />
                </div>

                <div class="form-row">
                    <label for="department">部門</label>
                    <input type="text" id="department" required />
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" required />
                </div>

                <div class="form-row">
                    <label for="salary">薪資</label>
                    <input type="number" id="salary" required />
                </div>


                <!--新增/取消-->
                <div class="button-group">
                    <button type="submit" id="submit-btn">新增員工</button>
                    <button type="button" id="cancel-btn" class="secondary hidden">取消編輯</button>
                </div>
            </form>

            <p id="message" class="message"></p>
        </section>


        <!--通訊錄呈現-->
        <section class="card">
            <div class="list-header">
                <h2>員工列表</h2>
                <button type="button" id="reload-btn" class="secondary">重新整理</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>部門</th>
                        <th>Email</th>
                        <th>薪資</th>
                        <th>操作</th>
                    </tr>
                </thead>

                <tbody id="employee-list">
                    <tr>
                        <td colspan="6" class="empty">
                            尚無資料
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>


    <script src="app.js"></script>
</body>
</html>
